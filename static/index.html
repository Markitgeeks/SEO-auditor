<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Auditor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

    <!-- TopBar -->
    <nav class="Polaris-TopBar">
        <div class="Polaris-TopBar__Logo">
            <div class="Polaris-TopBar__LogoIcon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
            </div>
            SEO Auditor
        </div>
        <button id="hamburger-btn" class="hamburger-btn" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M2 4.5h16M2 10h16M2 15.5h16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        </button>
        <div class="topbar-form">
            <form id="audit-form">
                <div class="topbar-form__row">
                    <div class="Polaris-TextField" style="flex:1">
                        <input id="url-input" type="url" placeholder="https://example.com" required class="Polaris-TextField__Input">
                    </div>
                    <button type="submit" id="audit-btn" class="Polaris-Button Polaris-Button--primary">Audit</button>
                    <div class="topbar-form__options">
                        <label class="Polaris-Checkbox">
                            <input type="checkbox" id="include-crawl" checked>
                            <span>Crawl</span>
                        </label>
                        <div id="crawl-pages-wrapper" style="display:flex;align-items:center;gap:var(--p-space-100)">
                            <span class="Polaris-Text--bodySm Polaris-Text--subdued">Max:</span>
                            <div class="Polaris-TextField" style="width:48px">
                                <input id="crawl-max-pages" type="number" min="1" max="50" value="10" class="Polaris-TextField__Input" style="text-align:center;padding:var(--p-space-100)">
                            </div>
                        </div>
                        <label class="Polaris-Checkbox">
                            <input type="checkbox" id="include-external">
                            <span>Intel</span>
                        </label>
                    </div>
                </div>
                <p id="error-msg" class="hidden topbar-error"></p>
            </form>
        </div>
        <button id="download-pdf-btn" class="Polaris-Button Polaris-Button--default topbar-pdf-btn hidden" title="Download PDF">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span class="pdf-btn-text">PDF</span>
        </button>
    </nav>

    <!-- Sidebar overlay (mobile) — outside grid to avoid layout interference -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- App Layout -->
    <div id="app-layout" class="app-layout">
        <!-- Sidebar -->
        <aside id="app-sidebar" class="app-sidebar">
            <div id="sidebar-content"></div>
        </aside>

        <!-- Main Panel -->
        <main id="app-main" class="app-main">
            <!-- Welcome state (before any audit) -->
            <div id="welcome-state" class="welcome-state">
                <div class="welcome-state__content">
                    <h1 class="Polaris-Text--headingXl mb-200">SEO Auditor</h1>
                    <p class="Polaris-Text--bodyMd Polaris-Text--subdued mb-400">Analyze any URL across 14 SEO categories with site crawl and market intelligence</p>
                    <p class="Polaris-Text--bodySm Polaris-Text--subdued">Enter a URL in the top bar and click Audit to get started.</p>
                </div>
            </div>

            <!-- Loading state -->
            <div id="loading-state" class="hidden">
                <div id="main-skeleton"></div>
            </div>

            <!-- Results: main content area -->
            <div id="main-content" class="hidden"></div>
        </main>
    </div>

    <script src="/static/js/store.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
