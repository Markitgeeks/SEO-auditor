services:
  - type: web
    name: seo-auditor-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SIMILARWEB_API_KEY
        sync: false
      - key: SEMRUSH_API_KEY
        sync: false
